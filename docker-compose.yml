services:

  # ── PostgreSQL (local dev — mirrors production) ───────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       linker
      POSTGRES_USER:     linker
      POSTGRES_PASSWORD: linker_dev_pw
    ports:
      - "5432:5432"          # expose so you can connect with psql / DBeaver
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linker"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Web application ───────────────────────────────────────────────────────
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app            # hot-reload: code changes are reflected immediately
    env_file:
      - .env
    environment:
      # Override DATABASE_URL so the container talks to the `db` service above
      DATABASE_URL: postgresql+psycopg2://linker:linker_dev_pw@db:5432/linker
    depends_on:
      db:
        condition: service_healthy
    # Override entrypoint for dev: hot-reload with single worker
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
